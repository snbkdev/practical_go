<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style type="text/css">
        body {
            max-width: 400px;
        }
        .comment {
            padding: 1rem;
            border: 1px solid black;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>
    <h1>{{.Title}}</h1>
    <p>{{.Content}}</p>
    {{ range .Comments }}
        <div class="comment">
            {{.Text}} £B
            <div>by {{.Username}}</div>
        </div>
    {{ end }}   
</body>
</html>
