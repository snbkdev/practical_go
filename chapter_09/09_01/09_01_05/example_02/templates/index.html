{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}}</title>
    {{ block "styles" . }}
        <style>
            h1 {
                color: #400080;
            }
        </style>
    {{ end }}
</head>
<body>
    <h1>{{template "title" .}}</h1>
    {{template "content" .}}
    {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
